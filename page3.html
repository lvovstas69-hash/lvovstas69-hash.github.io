
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Page-Enter" content="revealTrans(Duration=1.0,Transition=8)">
    <meta http-equiv="Page-Exit" content="revealTrans(Duration=1.0,Transition=9)">
    <title>Анкета</title>
</head>
<body background="https://www.transparenttextures.com/patterns/white-wall-3.png" style="margin:20px;">

<center>
<h2>Анкетные данные</h2>
</center>

<hr size="2" color="black">

<form action="index.html" method="get">
<fieldset>
<legend><b>Личные данные</b></legend>

Фамилия:<br>
<input type="text" name="surname" size="30" required><br><br>

Имя:<br>
<input type="text" name="name" size="30" required><br><br>

Отчество:<br>
<input type="text" name="patronymic" size="30"><br><br>

Пол:<br>
<input type="radio" name="gender" value="male" id="male" required>
<label for="male">Мужской</label><br>
<input type="radio" name="gender" value="female" id="female">
<label for="female">Женский</label><br><br>

Отделение:<br>
<select name="department" required>
<option value="">Выберите...</option>
<option value="fulltime">Очное</option>
<option value="parttime">Заочное</option>
</select><br><br>

Сдача зачётов:<br>
<input type="checkbox" name="math" id="math">
<label for="math">Математика (сдал)</label><br>
<input type="checkbox" name="physics" id="physics">
<label for="physics">Физика (сдал)</label><br>
<input type="checkbox" name="programming" id="programming">
<label for="programming">Программирование (сдал)</label><br><br>

Оценки:<br>
Математика:
<select name="math_grade">
<option value="">Выберите оценку</option>
<option value="5">5</option>
<option value="4">4</option>
<option value="3">3</option>
</select><br>

Физика:
<select name="physics_grade">
<option value="">Выберите оценку</option>
<option value="5">5</option>
<option value="4">4</option>
<option value="3">3</option>
</select><br>

Программирование:
<select name="programming_grade">
<option value="">Выберите оценку</option>
<option value="5">5</option>
<option value="4">4</option>
<option value="3">3</option>
</select><br><br>

</fieldset>

<br>
<center>
<input type="submit" value="Отправить" style="padding:10px 30px; font-size:16px; cursor:pointer;">
</center>

</form>

<br>
<center>
<a href="index.html">На главную</a>
</center>

</body>
</html>
